<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA PICKING | DIMEO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        :root {--primary: #6366f1;--bg: #0f172a;--card: #1e2937;--text: #e2e8f0;--accent: #67e8f9;}
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {font-family: 'Inter', sans-serif;background: var(--bg);color: var(--text);min-height: 100vh;padding: 10px;}
        
        /* LOGIN RESPONSIVO */
        #login-modal {display: flex; position: fixed; inset: 0; background: var(--bg); z-index: 2000; align-items: center; justify-content: center; padding: 15px;}
        .login-box {background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--primary); width: 100%; max-width: 400px; text-align: center;}
        .login-box h2 {margin-bottom: 20px; color: var(--accent); font-size: clamp(1.2rem, 5vw, 1.5rem);}
        .login-box select, .login-box input {width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 1rem;}
        .login-box button {width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer;}

        .container { max-width: 1200px; margin: 0 auto; display: none; }
        header {text-align: center; margin-bottom: 30px; padding: 0 10px;}
        .subtitle {font-size: 0.9rem; font-weight: 600; color: var(--accent); letter-spacing: 2px; text-transform: uppercase;}
        h1 {font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 700; background: linear-gradient(90deg, #6366f1, #a5b4fc); -webkit-background-clip: text;-webkit-text-fill-color: transparent;}
        
        .hub-grid {display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px;}
        .sucursal-card {background: var(--card); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid rgba(99, 102, 241, 0.2); transition: 0.3s;}
        .sucursal-card.pendiente {border-color: var(--primary); box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);}
        
        .btn-upload {width: 100%; padding: 12px; background: rgba(103, 232, 249, 0.05); color: var(--accent); border: 1px dashed var(--accent); border-radius: 10px; cursor: pointer; margin-bottom: 10px; font-weight: 600;}
        .btn-sucursal {width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600;}
        .btn-sucursal:disabled {background: #334155; cursor: not-allowed; opacity: 0.5;}

        /* MODAL PICKING ALTAMENTE RESPONSIVA */
        .modal {display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 5px;}
        .modal-content {background: #1e2937; border-radius: 15px; width: 98%; max-width: 1000px; height: 98vh; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #334155;}
        .modal-header {padding: 12px; background: #0f172a; border-bottom: 1px solid #334155;}
        .header-top {display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;}
        .header-actions {display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between;}
        .counter {background: #334155; padding: 6px 12px; border-radius: 20px; color: var(--accent); font-weight: 800; font-size: 1.1rem;}
        
        .modal-body {padding: 5px; overflow: auto; flex-grow: 1; -webkit-overflow-scrolling: touch;}
        .table-container { min-width: 100%; overflow-x: auto; }
        
        .picking-table {width: 100%; border-collapse: collapse; font-size: 0.85rem;}
        .picking-table th {text-align: left; padding: 8px; color: var(--accent); background: #0f172a; position: sticky; top: 0; z-index: 10;}
        .picking-table td {padding: 8px; border-bottom: 1px solid #334155;}
        
        input[type="number"] {width: 65px; background: #0f172a; border: 1px solid #475569; color: white; padding: 6px; border-radius: 5px; text-align: center;}
        input[type="checkbox"] {width: 28px; height: 28px; cursor: pointer; accent-color: var(--primary);}
        
        .finalizar-btn {padding: 10px 18px; background: #10b981; color: white; border: none; border-radius: 20px; font-weight: 700; cursor: pointer; font-size: 0.85rem;}
        .guardar-btn {padding: 10px 18px; background: #f59e0b; color: white; border: none; border-radius: 20px; font-weight: 700; cursor: pointer; font-size: 0.85rem;}
        .close {cursor:pointer; font-size: 2rem; color: #94a3b8; padding: 5px;}

        @media (max-width: 600px) {
            .header-actions { justify-content: center; width: 100%; }
            .header-actions div { width: 100%; display: flex; justify-content: center; gap: 5px; }
            .counter { width: 100%; text-align: center; margin-bottom: 5px; }
            .picking-table th:nth-child(2), .picking-table td:nth-child(2) { display: none; } /* Ocultar columna Pedido en móviles extremos si es necesario */
        }
    </style>
</head>
<body>

    <div id="login-modal">
        <div class="login-box">
            <h2 style="color: #6366f1;">DIMEO LOGÍSTICA</h2>
            <select id="user-select">
                <option value="">Seleccione Operador...</option>
                <script>
                    for(let i=1; i<=10; i++) {
                        let val = i.toString().padStart(3, '0');
                        document.write(`<option value="${val}">Operador ${val}</option>`);
                    }
                </script>
            </select>
            <input type="password" id="pass-input" placeholder="Contraseña">
            <button onclick="validarAcceso()">INGRESAR</button>
            <p id="login-error" style="color: #f87171; margin-top: 10px; font-size: 0.8rem; display: none;">Contraseña incorrecta</p>
        </div>
    </div>

    <div class="container" id="main-app">
        <header>
            <div class="subtitle">Logística Dimeo</div>
            <h1>OPERACIÓN PICKING</h1>
            <div id="op-display" style="color: var(--accent); margin-top: 5px; font-size: 0.9rem;"></div>
        </header>
        <div class="hub-grid" id="sucursales-grid"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="header-top">
                    <div>
                        <h2 id="modal-sucursal" style="color:var(--accent); margin: 0; font-size: 1.1rem;"></h2>
                        <div id="folio-display" style="color: #6366f1; font-weight: 700; font-size: 0.85rem;"></div>
                    </div>
                    <span class="close" onclick="cerrarModal()">×</span>
                </div>
                <div class="header-actions">
                    <div class="counter" id="contador">0</div>
                    <div style="display: flex; gap: 8px;">
                        <button class="guardar-btn" onclick="guardarProgreso()">💾 GUARDAR</button>
                        <button id="btn-finalizar" class="finalizar-btn" onclick="procesarCierre()">🏁 FINALIZAR</button>
                    </div>
                </div>
            </div>
            <div class="modal-body">
                <div class="table-container">
                    <table class="picking-table" id="tabla-picking">
                        <thead>
                            <tr>
                                <th width="60%">Producto</th>
                                <th width="12%" style="text-align:center;">Ped.</th>
                                <th width="14%" style="text-align:center;">Surt.</th>
                                <th width="14%" style="text-align:center;">Ok</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let operadorActivo = "";
        const sucursales = ["Aguascalientes", "Américas", "Colli", "León", "Medrano", "Morelia", "Querétaro", "San Luis", "Tijuana", "Vallarta", "Think & Print"];
        const inicialesSucursal = {"Aguascalientes": "AGS", "Américas": "AME", "Colli": "COL", "León": "LEO", "Medrano": "MED", "Morelia": "MOR", "Querétaro": "QRO", "San Luis": "SLP", "Tijuana": "TIJ", "Vallarta": "VTA", "Think & Print": "TYP"};

        let sucursalActual = "";
        let folioExtraido = "";
        let datosExtraidos = [];

        function validarAcceso() {
            const user = document.getElementById('user-select').value;
            const pass = document.getElementById('pass-input').value;
            if (user && pass === "D" + user) {
                operadorActivo = user;
                document.getElementById('login-modal').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('op-display').textContent = "OPERADOR: " + operadorActivo;
                init();
            } else { document.getElementById('login-error').style.display = 'block'; }
        }

        function init() {
            const grid = document.getElementById('sucursales-grid');
            grid.innerHTML = "";
            sucursales.forEach((nombre, i) => {
                const id = (i + 1).toString().padStart(2, '0');
                const datosGuardados = localStorage.getItem(`picking_${nombre}`);
                grid.innerHTML += `
                    <div class="sucursal-card ${datosGuardados ? 'pendiente' : ''}" id="card-${nombre}">
                        <div style="font-size:1.2rem; font-weight:600; margin-bottom:15px;">${nombre}</div>
                        <input type="file" id="file-${id}" style="display:none" accept="application/pdf" onchange="leerPedidoPDF('${nombre}', this)">
                        <button class="btn-upload" onclick="document.getElementById('file-${id}').click()">📄 CARGAR PDF</button>
                        <button class="btn-sucursal" id="btn-picking-${nombre}" ${!datosGuardados ? 'disabled' : ''} onclick="abrirPickingGuardado('${nombre}')">PICKING</button>
                    </div>
                `;
            });
        }

        async function leerPedidoPDF(sucursal, input) {
            const file = input.files[0];
            if (!file) return;
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let text = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(s => s.str).join(" ") + " ";
            }
            const regexFolio = /([A-Z]{3}\/[A-Z_]+\/\d{5}|PEDIDO_[A-Z_]+-\d{5})/;
            const matchFolio = text.match(regexFolio);
            if (matchFolio) folioExtraido = matchFolio[0];
            else { alert("Folio no detectado."); return; }

            const regexProd = /(\[[A-Z0-9-]+\].+?)\s+([\d.]+)\s+PIEZA/g;
            let match;
            datosExtraidos = [];
            while ((match = regexProd.exec(text)) !== null) {
                datosExtraidos.push({ desc: match[1].trim(), cantPedida: parseFloat(match[2]), cantSurtida: parseFloat(match[2]), ok: false });
            }
            if (datosExtraidos.length > 0) {
                sucursalActual = sucursal;
                cargarTabla();
            }
            input.value = "";
        }

        function abrirPickingGuardado(sucursal) {
            const saved = JSON.parse(localStorage.getItem(`picking_${sucursal}`));
            if (saved) {
                sucursalActual = sucursal;
                folioExtraido = saved.folio;
                datosExtraidos = saved.items;
                cargarTabla();
            }
        }

        function cargarTabla() {
            document.getElementById("modal-sucursal").textContent = sucursalActual;
            document.getElementById("folio-display").textContent = "REF: " + folioExtraido;
            const tbody = document.querySelector("#tabla-picking tbody");
            tbody.innerHTML = "";
            datosExtraidos.forEach((item, i) => {
                tbody.innerHTML += `
                    <tr>
                        <td style="font-size:0.75rem;">${item.desc}</td>
                        <td style="text-align:center; font-weight:700;">${item.cantPedida}</td>
                        <td style="text-align:center;"><input type="number" value="${item.cantSurtida}" oninput="actualizarDato(${i}, 'cantSurtida', this.value)"></td>
                        <td style="text-align:center;"><input type="checkbox" ${item.ok ? 'checked' : ''} onchange="actualizarDato(${i}, 'ok', this.checked)"></td>
                    </tr>
                `;
            });
            document.getElementById("modal").style.display = "flex";
            revisarFinalizacion();
        }

        function actualizarDato(index, campo, valor) {
            if(campo === 'cantSurtida') datosExtraidos[index].cantSurtida = parseFloat(valor) || 0;
            if(campo === 'ok') datosExtraidos[index].ok = valor;
            revisarFinalizacion();
        }

        function guardarProgreso() {
            localStorage.setItem(`picking_${sucursalActual}`, JSON.stringify({ folio: folioExtraido, items: datosExtraidos }));
            init();
            alert("Guardado.");
        }

        function revisarFinalizacion() {
            let pendientes = datosExtraidos.filter(item => !item.ok).length;
            document.getElementById("contador").textContent = pendientes;
            document.getElementById("btn-finalizar").style.display = (pendientes === 0) ? "block" : "none";
        }

        function procesarCierre() {
            const hoy = new Date();
            const dia = String(hoy.getDate()).padStart(2, '0');
            const mes = String(hoy.getMonth() + 1).padStart(2, '0');
            const añoBreve = String(hoy.getFullYear()).slice(-2);
            const folioPersonalizado = `${inicialesSucursal[sucursalActual]}_${dia}${mes}${añoBreve}`;

            const generarPDF = (subtitulo, data, esExcepcion) => {
                const doc = new jsPDF();
                const mTop = 8;
                let tPed = 0, tSur = 0, tExc = 0;
                data.forEach(row => {
                    tPed += parseFloat(row[1]);
                    tSur += parseFloat(row[2]);
                    if(esExcepcion) tExc += parseFloat(row[3]);
                });

                doc.setFontSize(12); doc.setFont("helvetica", "bold");
                doc.text("DIMEO", 14, 10 + mTop); 
                doc.setFontSize(10); doc.setFont("helvetica", "normal");
                doc.text("ALTOS HORNOS 2800, ALAMO INDUSTRIAL", 14, 15 + mTop);
                doc.text("45593 SAN PEDRO TLAQUEPAQUE, JAL, MÉXICO", 14, 20 + mTop);
                doc.setFontSize(14); doc.setFont("helvetica", "bold");
                doc.text("OPERACIÓN PICKING", 196, 10 + mTop, { align: "right" });
                doc.setFontSize(12);
                doc.text(`Sucursal: ${sucursalActual}`, 196, 16 + mTop, { align: "right" });
                doc.setFontSize(10); doc.setFont("helvetica", "normal");
                doc.text(`Generado: ${hoy.toLocaleString()}`, 196, 22 + mTop, { align: "right" });
                doc.setFontSize(13); doc.setFont("helvetica", "bold"); doc.setTextColor(30, 60, 180);
                doc.text(`${folioExtraido}`, 14, 40 + mTop); doc.text(`${folioPersonalizado}`, 196, 40 + mTop, { align: "right" });
                doc.setTextColor(0, 0, 0); doc.setFontSize(11);
                doc.text(subtitulo, 105, 52 + mTop, { align: "center" });

                const finalData = [...data];
                finalData.push([
                    { content: 'TOTALES', styles: { fontStyle: 'bold', halign: 'right' } },
                    { content: tPed.toString(), styles: { fontStyle: 'bold', halign: 'center' } },
                    { content: tSur.toString(), styles: { fontStyle: 'bold', halign: 'center' } },
                    ...(esExcepcion ? [{ content: tExc.toString(), styles: { fontStyle: 'bold', halign: 'center' } }] : [])
                ]);

                doc.autoTable({
                    startY: 60 + mTop,
                    head: [esExcepcion ? ['Producto', 'PEDIDO', 'SURTIDO', 'EXCEPCIÓN'] : ['Producto', 'Pedido', 'Surtido']],
                    body: finalData,
                    headStyles: { fillColor: esExcepcion ? [180, 0, 0] : [63, 101, 241] },
                    theme: 'grid'
                });

                const pageHeight = doc.internal.pageSize.height;
                doc.setFontSize(10); doc.setFont("helvetica", "bold");
                doc.text(`Operador: ${operadorActivo}`, 105, pageHeight - 10, { align: "center" });
                return doc;
            };

            const totalData = datosExtraidos.map(i => [i.desc, i.cantPedida, i.cantSurtida]);
            const excData = datosExtraidos.filter(i => i.cantPedida > i.cantSurtida).map(i => [i.desc, i.cantPedida, i.cantSurtida, i.cantPedida - i.cantSurtida]);

            generarPDF("REPORTE DE SURTIDO TOTAL", totalData, false).save(`TOTAL_${folioPersonalizado}.pdf`);
            
            if(excData.length > 0) {
                setTimeout(() => {
                    generarPDF("REPORTE DE EXCEPCIÓN DE SURTIDO", excData, true).save(`EXCEPCION_${folioPersonalizado}.pdf`);
                }, 1500);
            }

            localStorage.removeItem(`picking_${sucursalActual}`);
            setTimeout(() => { init(); cerrarModal(); }, 1600);
        }

        function cerrarModal() { document.getElementById("modal").style.display = "none"; }
    </script>
</body>
</html>
